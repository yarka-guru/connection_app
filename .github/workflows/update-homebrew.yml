name: Update Homebrew Tap

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 3.1.0)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  update-tap:
    runs-on: ubuntu-latest
    # Only run if Release succeeded (or manual dispatch)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Get version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${HEAD_BRANCH#v}"
          fi
          # Validate version format BEFORE any use (only digits and dots)
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format: $VERSION"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          gh release download "v${VERSION}" -R yarka-guru/connection_app \
            -p "ConnectionApp_${VERSION}_aarch64.dmg" \
            -p "ConnectionApp_${VERSION}_x64.dmg" \
            -p "ConnectionApp_${VERSION}_amd64.deb" \
            -p "ConnectionApp_${VERSION}_arm64.deb"

      - name: Compute SHA256 hashes
        id: hashes
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          echo "ARM_DMG_SHA=$(sha256sum "ConnectionApp_${VERSION}_aarch64.dmg" | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "X64_DMG_SHA=$(sha256sum "ConnectionApp_${VERSION}_x64.dmg" | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "AMD64_DEB_SHA=$(sha256sum "ConnectionApp_${VERSION}_amd64.deb" | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "ARM64_DEB_SHA=$(sha256sum "ConnectionApp_${VERSION}_arm64.deb" | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Checkout Homebrew tap
        uses: actions/checkout@v5
        with:
          repository: yarka-guru/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Cask formula
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          ARM_DMG_SHA: ${{ steps.hashes.outputs.ARM_DMG_SHA }}
          X64_DMG_SHA: ${{ steps.hashes.outputs.X64_DMG_SHA }}
        run: |
          # Remove old cask file if it exists
          rm -f homebrew-tap/Casks/rds-ssm-connect.rb
          cat > homebrew-tap/Casks/connection-app.rb << CASK
          cask "connection-app" do
            version "${VERSION}"

            on_arm do
              sha256 "${ARM_DMG_SHA}"
              url "https://github.com/yarka-guru/connection_app/releases/download/v#{version}/ConnectionApp_#{version}_aarch64.dmg"
            end

            on_intel do
              sha256 "${X64_DMG_SHA}"
              url "https://github.com/yarka-guru/connection_app/releases/download/v#{version}/ConnectionApp_#{version}_x64.dmg"
            end

            name "ConnectionApp"
            desc "Secure tunneling via AWS SSM"
            homepage "https://github.com/yarka-guru/connection_app"

            depends_on macos: ">= :monterey"

            app "ConnectionApp.app"

            caveats <<~EOS
              Ensure your AWS profiles are configured in ~/.aws/config
            EOS

            zap trash: [
              "~/Library/Application Support/com.connection-app.desktop",
              "~/Library/Caches/com.connection-app.desktop",
            ]
          end
          CASK

      - name: Update Linux formula
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          AMD64_DEB_SHA: ${{ steps.hashes.outputs.AMD64_DEB_SHA }}
          ARM64_DEB_SHA: ${{ steps.hashes.outputs.ARM64_DEB_SHA }}
        run: |
          # Remove old formula file if it exists
          rm -f homebrew-tap/Formula/rds-ssm-connect.rb
          cat > homebrew-tap/Formula/connection-app.rb << 'FORMULA'
          class ConnectionApp < Formula
            desc "Secure tunneling via AWS SSM"
            homepage "https://github.com/yarka-guru/connection_app"
            version "PLACEHOLDER_VERSION"
            license "MIT"

            on_linux do
              on_intel do
                url "https://github.com/yarka-guru/connection_app/releases/download/v#{version}/ConnectionApp_#{version}_amd64.deb"
                sha256 "PLACEHOLDER_AMD64_SHA"
              end
              on_arm do
                url "https://github.com/yarka-guru/connection_app/releases/download/v#{version}/ConnectionApp_#{version}_arm64.deb"
                sha256 "PLACEHOLDER_ARM64_SHA"
              end
            end

            def install
              system "ar", "x", cached_download
              mkdir_p "extract"
              system "tar", "xf", Dir["data.tar.*"].first, "-C", "extract"

              bin.install Dir["extract/usr/bin/*"]
              share.install Dir["extract/usr/share/*"] if Dir.exist?("extract/usr/share")
            end

            def post_install
              # Generate .desktop file with correct Homebrew paths
              desktop_dir = Pathname.new(File.expand_path("~/.local/share/applications"))
              desktop_dir.mkpath
              desktop_file = desktop_dir/"connection-app.desktop"
              desktop_file.unlink if desktop_file.exist?
              desktop_file.write <<~DESKTOP
                [Desktop Entry]
                Name=ConnectionApp
                Comment=Secure tunneling via AWS SSM
                Exec=#{bin}/connection-app
                Icon=#{share}/icons/hicolor/128x128/apps/connection-app.png
                Type=Application
                Categories=Development;Network;
                Terminal=false
              DESKTOP

              # Copy icons to user icon directory
              icon_src = share/"icons/hicolor"
              if icon_src.exist?
                icon_dest = Pathname.new(File.expand_path("~/.local/share/icons/hicolor"))
                icon_src.glob("*/apps/*.png").each do |icon|
                  size_dir = icon_dest/icon.parent.parent.basename/"apps"
                  size_dir.mkpath
                  dest_icon = size_dir/icon.basename
                  dest_icon.unlink if dest_icon.exist?
                  cp icon, dest_icon
                end
              end
            end

            def post_uninstall
              desktop_file = Pathname.new(File.expand_path("~/.local/share/applications/connection-app.desktop"))
              desktop_file.unlink if desktop_file.exist?

              icon_base = Pathname.new(File.expand_path("~/.local/share/icons/hicolor"))
              Pathname.glob(icon_base/"*/apps/connection-app.png").each(&:unlink)
            end

            def caveats
              <<~EOS
                Ensure your AWS profiles are configured in ~/.aws/config

                On macOS, install the desktop app instead:
                  brew install --cask connection-app
              EOS
            end
          end
          FORMULA
          # Replace placeholders with actual values (use | delimiter to avoid injection via /)
          sed -i "s|PLACEHOLDER_VERSION|${VERSION}|" homebrew-tap/Formula/connection-app.rb
          sed -i "s|PLACEHOLDER_AMD64_SHA|${AMD64_DEB_SHA}|" homebrew-tap/Formula/connection-app.rb
          sed -i "s|PLACEHOLDER_ARM64_SHA|${ARM64_DEB_SHA}|" homebrew-tap/Formula/connection-app.rb

      - name: Update README
        run: |
          cat > homebrew-tap/README.md << 'README'
          # Homebrew Tap for ConnectionApp

          Secure tunneling via AWS SSM.

          ## Installation

          ### macOS (Desktop App)

          ```bash
          brew tap yarka-guru/tap
          brew install --cask connection-app
          ```

          ### Linux (x86_64 / ARM64)

          ```bash
          brew tap yarka-guru/tap
          brew install connection-app
          ```

          ## Direct Downloads

          Download installers directly from [GitHub Releases](https://github.com/yarka-guru/connection_app/releases/latest):

          | Platform | Format |
          |----------|--------|
          | macOS (Apple Silicon) | `.dmg` |
          | macOS (Intel) | `.dmg` |
          | Linux (x86_64) | `.deb`, `.rpm`, `.AppImage` |
          | Linux (ARM64) | `.deb`, `.AppImage` |
          | Windows | `.exe` (NSIS), `.msi` |

          ## Updating

          ```bash
          brew update
          brew upgrade --cask connection-app  # macOS
          brew upgrade connection-app          # Linux
          ```
          README

      - name: Commit and push
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update to v${VERSION}"
            git push
          fi
